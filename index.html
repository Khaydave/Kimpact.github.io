<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Kimpact Development Initiative | Official Links</title>
    <style>
        :root {
            --bg-main: #f0f4f8; 
            --text-dark: #0f172a;
            --text-muted: #475569;
            --navy-primary: #0a2540;
            --card-shadow: rgba(10, 37, 64, 0.04);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px; 
            overflow: hidden; 
            position: relative;
        }

        /* --- Animated Social Background Engine --- */
        .bg-animations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* Pure CSS vector rendering for background floating icons */
        .bg-icon {
            position: absolute;
            bottom: -150px;
            opacity: 0.22;
            fill: var(--navy-primary);
            animation: floatUp 26s linear infinite;
        }

        /* Significantly reduced icon sizes for a clean, non-distracting visual accent */
        .bg-icon:nth-child(1) { left: 8%; width: 45px; height: 45px; animation-duration: 22s; animation-delay: -5s; }
        .bg-icon:nth-child(2) { left: 22%; width: 65px; height: 65px; animation-duration: 32s; animation-delay: -15s; }
        .bg-icon:nth-child(3) { left: 68%; width: 55px; height: 55px; animation-duration: 28s; animation-delay: -8s; }
        .bg-icon:nth-child(4) { left: 88%; width: 40px; height: 40px; animation-duration: 20s; animation-delay: 2s; }
        .bg-icon:nth-child(5) { left: 45%; width: 70px; height: 70px; animation-duration: 36s; animation-delay: 6s; }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.22;
            }
            90% {
                opacity: 0.22;
            }
            100% {
                transform: translateY(-140vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            width: 100%;
            max-width: 440px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInPage 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 10;
        }

        /* Profile Section */
        .profile {
            text-align: center;
            margin-bottom: 24px; 
        }

        .profile-img-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 12px; 
        }

        .profile-img {
            width: 380px;
            max-width: 100%;
            height: auto;
            object-fit: contain;
            transition: var(--transition-smooth);
        }

        .profile:hover .profile-img {
            transform: scale(1.02);
        }

        .profile h1 {
            font-size: 1.65rem;
            font-weight: 800;
            color: var(--navy-primary);
            letter-spacing: -0.5px;
            line-height: 1.25;
            margin-bottom: 6px; 
        }

        .profile p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.1px;
        }

        /* Links List Layout */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px; 
        }

        .link-card {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 16px 24px;
            text-decoration: none;
            color: var(--text-dark);
            background-color: #ffffff;
            border: 1.5px solid var(--text-dark);
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: -0.1px;
            box-shadow: 0 4px 10px rgba(10, 37, 64, 0.03);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .link-card svg {
            width: 22px;
            height: 22px;
            margin-right: 16px; 
            fill: currentColor; 
            transition: var(--transition-smooth);
            flex-shrink: 0;
        }

        .link-card:hover {
            background-color: var(--navy-primary);
            border-color: var(--navy-primary);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(10, 37, 64, 0.15);
        }

        .link-card:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(10, 37, 64, 0.1);
        }

        footer {
            margin-top: 48px; 
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        @keyframes fadeInPage {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
