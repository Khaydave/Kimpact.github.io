<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimpact Development Initiative | Official Links</title>
    <style>
        :root {
            --bg-main: #f0f4f8; 
            --text-dark: #0f172a;
            --text-muted: #475569;
            --navy-primary: #0a2540;
            --card-shadow: rgba(10, 37, 64, 0.04);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px; 
            overflow: hidden; 
            position: relative;
        }

        /* --- Animated Background Engine --- */
        .bg-animations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .bg-logo {
            position: absolute;
            bottom: -300px;
            background-image: url('./logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.60;
            filter: grayscale(100%);
            animation: floatUp 26s linear infinite;
        }

        /* Negative delays force these elements to instantly render halfway up their path on page load */
        .bg-logo:nth-child(1) { left: 5%; width: 165px; height: 165px; animation-duration: 22s; animation-delay: -5s; }
        .bg-logo:nth-child(2) { left: 25%; width: 250px; height: 250px; animation-duration: 32s; animation-delay: -15s; }
        .bg-logo:nth-child(3) { left: 65%; width: 215px; height: 215px; animation-duration: 28s; animation-delay: -8s; }
        /* These two will seamlessly emerge from the bottom shortly after */
        .bg-logo:nth-child(4) { left: 85%; width: 135px; height: 135px; animation-duration: 20s; animation-delay: 2s; }
        .bg-logo:nth-child(5) { left: 45%; width: 230px; height: 230px; animation-duration: 36s; animation-delay: 6s; }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.60;
            }
            90% {
                opacity: 0.60;
            }
            100% {
                transform: translateY(-140vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            width: 100%;
            max-width: 440px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInPage 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 10;
        }

        /* Profile Section */
        .profile {
            text-align: center;
            margin-bottom: 24px; 
        }

        .profile-img-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 12px; 
        }

        /* Main Hero Logo */
        .profile-img {
            width: 380px;
            max-width: 100%;
            height: auto;
            object-fit: contain;
            transition: var(--transition-smooth);
        }

        .profile:hover .profile-img {
            transform: scale(1.02);
        }

        .profile h1 {
            font-size: 1.65rem;
            font-weight: 800;
            color: var(--navy-primary);
            letter-spacing: -0.5px;
            line-height: 1.25;
            margin-bottom: 6px; 
        }

        .profile p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.1px;
        }

        /* Links List Layout */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px; 
        }

        .link-card {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px 24px;
            text-decoration: none;
            color: var(--text-dark);
            background-color: #ffffff;
            border: 1.5px solid var(--text-dark);
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: -0.1px;
            box-shadow: 0 4px 10px rgba(10, 37, 64, 0.03);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            background-color: var(--navy-primary);
            border-color: var(--navy-primary);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(10, 37, 64, 0.15);
        }

        .link-card:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(10, 37, 64, 0.1);
        }

        footer {
            margin-top: 48px; 
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        @keyframes fadeInPage {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="bg-animations">
        <div class="bg-logo"></div>
        <div class="bg-logo"></div>
        <div class="bg-logo"></div>
        <div class="bg-logo"></div>
        <div class="bg-logo"></div>
    </div>

    <div class="container">
        <div class="profile">
            <div class="profile-img-wrapper">
                <img class="profile-img" src="./logo.png" alt="Kimpact Development Initiative Logo">
            </div>
            <h1>Kimpact Development Initiative</h1>
            <p>Follow our social media pages here</p>
        </div>

        <div class="links-container">
            <a href="https://www.facebook.com/share/193ty2sscQ/" target="_blank" class="link-card">Facebook</a>
            <a href="https://www.instagram.com/kimpact_global" target="_blank" class="link-card">Instagram</a>
            <a href="https://x.com/Kimpact_Global" target="_blank" class="link-card">X (Formerly Twitter)</a>
            <a href="https://www.tiktok.com/@kimpactglobal" target="_blank" class="link-card">TikTok</a>
            <a href="https://www.linkedin.com/company/kimpactglobal/" target="_blank" class="link-card">LinkedIn</a>
        </div>

        <footer>
            &copy; 2026 Kimpact Development Initiative.
        </footer>
    </div>

</body>
</html>
