<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimpact Development Initiative | Official Links</title>
    <style>
        :root {
            --bg-main: #f0f4f8; /* Elegant premium light blue backdrop */
            --text-dark: #0f172a;
            --text-muted: #475569;
            --navy-primary: #0a2540;
            --border-soft: #e2e8f0;
            --card-shadow: rgba(10, 37, 64, 0.04);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 24px;
            overflow-x: hidden;
        }

        /* Ambient light accent glow overlay */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 440px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInPage 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Profile Section */
        .profile {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-img-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* Cleaned Logo Styling - No circles, borders, or background colors */
        .profile-img {
            width: 120px; /* Increased slightly since the border padding is gone */
            height: auto;  /* Allows the logo to maintain its natural proportions */
            object-fit: contain;
            transition: var(--transition-smooth);
        }

        .profile:hover .profile-img {
            transform: scale(1.05);
        }

        .profile h1 {
            font-size: 1.65rem;
            font-weight: 800;
            color: var(--navy-primary);
            letter-spacing: -0.5px;
            line-height: 1.25;
            margin-bottom: 8px;
        }

        .profile p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.1px;
        }

        /* Links List Layout */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px 24px;
            text-decoration: none;
            color: var(--text-dark);
            background-color: #ffffff; /* Solid white background for clear readability */
            border: 1.5px solid var(--text-dark);
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: -0.1px;
            box-shadow: 0 4px 10px rgba(10, 37, 64, 0.03);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        /* Elevated Hover Experience */
        .link-card:hover {
            background-color: var(--navy-primary);
            border-color: var(--navy-primary);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(10, 37, 64, 0.15);
        }

        /* Active click compression feel */
        .link-card:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(10, 37, 64, 0.1);
        }

        /* Clean Footer Markings */
        footer {
            margin-top: 64px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Page Loading Animation Entry */
        @keyframes fadeInPage {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Header -->
        <div class="profile">
            <div class="profile-img-wrapper">
                <!-- Swap with 'logo.png' once added to your GitHub repository folder -->
                <img class="profile-img" src="logo.png" alt="Kimpact Development Initiative Logo">
            </div>
            <h1>Kimpact Development Initiative</h1>
            <p>Follow our social media pages here</p>
        </div>

        <!-- Social Navigation Links -->
        <div class="links-container">
            <a href="https://www.facebook.com/share/193ty2sscQ/" target="_blank" class="link-card">Facebook</a>
            <a href="https://www.instagram.com/kimpact_global" target="_blank" class="link-card">Instagram</a>
            <a href="https://x.com/Kimpact_Global" target="_blank" class="link-card">X (Formerly Twitter)</a>
            <a href="https://www.tiktok.com/@kimpactglobal" target="_blank" class="link-card">TikTok</a>
            <a href="https://www.linkedin.com/company/kimpactglobal/" target="_blank" class="link-card">LinkedIn</a>
        </div>

        <!-- Footer -->
        <footer>
            &copy; 2026 Kimpact Development Initiative.
        </footer>
    </div>

</body>
</html>
